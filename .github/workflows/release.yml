name: Build Releases
on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch: # <--- 添加这一行

env:
  CARGO_TERM_COLOR: always

jobs:
  build-mips-nightly:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full
    strategy:
      matrix:
        target:
          - mipsel-unknown-linux-musl

    steps:
      - uses: actions/checkout@v5
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rust-src
      - uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --release --target ${{ matrix.target }} -Z build-std,panic_abort
        env: 
          RUSTFLAGS: "-C panic=abort"
      - name: Rename artifacts and compress
        run: |
          cd target/${{ matrix.target }}/release
          mv client phantun_client
          mv server phantun_server
          zip phantun_${{ matrix.target }}_nightly.zip phantun_client phantun_server

      - name: Upload Github Assets
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/*.zip
          prerelease: ${{ contains(github.ref, '-') }}
